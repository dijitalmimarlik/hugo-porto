name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"] # Eğer ana dalınızın adı master ise burayı master yapın

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true # Tasarım temalarının çalışması için bu şarttır

      - name: Build
        run: hugo --minify

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
